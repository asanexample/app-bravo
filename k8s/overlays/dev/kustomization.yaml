replicas:
  - name: app-bravo
    count: 1
images:
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-bravo/demo-web
    newTag: placeholder # CI replaces with the signed digest at deploy (promote-by-PR, #377)
