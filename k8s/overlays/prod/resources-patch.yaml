# prod resource bump (real per-stage delta): higher requests/limits for production load.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-bravo
spec:
  template:
    spec:
      containers:
        - name: app-bravo
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
