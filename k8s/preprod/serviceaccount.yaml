# Named ServiceAccount the app's pods run as. If the tenant needs AWS, access is granted out-of-band by a
# platform-managed EKS Pod Identity association (declare it in the Tenant claim's `aws` block) -> the
# team-bravo role (platform ADR-041). Deliberately NO eks.amazonaws.com/role-arn annotation (that's IRSA,
# and is denied in tenant namespaces by the disallow-irsa-annotation-cross-team policy).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-bravo
  namespace: team-bravo
  labels:
    app.kubernetes.io/name: app-bravo
