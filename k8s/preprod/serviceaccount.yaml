# Named ServiceAccount the app's pods run as. If the tenant needs AWS, access is granted out-of-band by a
# platform-managed EKS Pod Identity association (declare it in the claim's apps.<app>.permissions.aws) -> the
# per-app Pod-bravo-demo-dev-demo role (platform ADR-041). Deliberately NO eks.amazonaws.com/role-arn annotation (that's IRSA,
# and is denied in tenant namespaces by the disallow-irsa-annotation-cross-team policy).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-bravo
  namespace: bravo-demo-dev
  labels:
    app.kubernetes.io/name: app-bravo
