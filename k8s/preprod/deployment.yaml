apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-bravo
  namespace: team-bravo
  labels:
    app: app-bravo
    app.kubernetes.io/name: app-bravo
    team: bravo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-bravo
  template:
    metadata:
      labels:
        app: app-bravo
        app.kubernetes.io/name: app-bravo
        team: bravo
    spec:
      # Named SA — Pod Identity binds AWS creds here IF the tenant declares any (ADR-041). This starter
      # needs no AWS, but keeps the named SA so the wiring is ready (and never the `default` SA).
      serviceAccountName: app-bravo
      # App does not talk to the Kubernetes API — drop the SA token (least privilege). Required by the
      # platform Kyverno policy restrict-automount-sa-token (also auto-injected by mutate when absent).
      automountServiceAccountToken: false
      containers:
        - name: app-bravo
          # Pinned to the signed digest by the deploy workflow on each push to main. The :placeholder
          # tag is only the pre-first-deploy seed (ArgoCD is pointed here after CI pins a real digest).
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-bravo/demo@sha256:fc8970ab555d68254c8a78359bc219eedb9690a5e2ecb6b6d35959a2dabba768
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "ad315e46535d4207b258986da1b38f8381337ee1"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
