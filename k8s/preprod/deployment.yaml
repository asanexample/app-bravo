apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-bravo
  namespace: bravo-demo-dev
  labels:
    app: app-bravo
    app.kubernetes.io/name: app-bravo
    team: bravo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-bravo
  template:
    metadata:
      labels:
        app: app-bravo
        app.kubernetes.io/name: app-bravo
        team: bravo
    spec:
      # Named SA — Pod Identity binds AWS creds here IF the tenant declares any (ADR-041). This starter
      # needs no AWS, but keeps the named SA so the wiring is ready (and never the `default` SA).
      serviceAccountName: app-bravo
      # App does not talk to the Kubernetes API — drop the SA token (least privilege). Required by the
      # platform Kyverno policy restrict-automount-sa-token (also auto-injected by mutate when absent).
      automountServiceAccountToken: false
      containers:
        - name: app-bravo
          # Pinned to the signed digest by the deploy workflow on each push to main. The :placeholder
          # tag is only the pre-first-deploy seed (ArgoCD is pointed here after CI pins a real digest).
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-bravo/demo@sha256:20f54c2e299cb0343d3c683076ee0d31334b9b7cc557d64f5066ac80076c8a44
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "9667e6f8038903bb74e315777d6a9f94199b1c10"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
