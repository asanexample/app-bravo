apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-bravo
  namespace: team-bravo
spec:
  parentRefs:
    - name: preprod-gateway
      namespace: default
      sectionName: https
  # Must be in team-bravo's allow-list (the Tenant claim's `hostnames`), or admission rejects it
  # (Kyverno restrict-route-hostnames-bravo).
  hostnames:
    - demo-bravo.preprod.aws.refplat.org
  rules:
    - backendRefs:
        - name: app-bravo
          port: 80
