apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-bravo
  namespace: bravo-demo-dev
spec:
  parentRefs:
    - name: preprod-gateway
      namespace: default
      sectionName: https
  # Placeholder only — the platform injects the real host (ADR-060: <app>-<team>-<env>.<baseDomain>, i.e.
  # demo-bravo-dev.preprod.aws.refplat.org) via an argocd-apps kustomize patch on /spec/hostnames/0. Do NOT
  # hardcode a real host here; `.invalid` fails safe (admission-rejected, never a wrong host) if the patch
  # ever doesn't apply.
  hostnames:
    - placeholder.invalid
  rules:
    - backendRefs:
        - name: app-bravo
          port: 80
