apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-bravo
  labels:
    app: app-bravo
    app.kubernetes.io/name: app-bravo
    team: bravo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-bravo
  template:
    metadata:
      labels:
        app: app-bravo
        app.kubernetes.io/name: app-bravo
        team: bravo
    spec:
      # Named SA — Pod Identity binds AWS creds here IF the Environment declares any (ADR-041). This starter
      # needs no AWS, but keeps the named SA so the wiring is ready (and never the `default` SA).
      serviceAccountName: app-bravo
      # App does not talk to the Kubernetes API — drop the SA token (least privilege). Required by the
      # platform Kyverno policy restrict-automount-sa-token (also auto-injected by mutate when absent).
      automountServiceAccountToken: false
      containers:
        - name: app-bravo
          # Product-scoped ECR image (v3: team-<team>/<product>-<service>). The :placeholder tag is the
          # pre-first-deploy seed; each overlay's `images:` pins the signed digest CI promotes per stage
          # (promote-by-PR, #377). restrict-images admits team-bravo/demo-* (the product's repos).
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-bravo/demo-web:placeholder
          ports:
            - containerPort: 8080
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
