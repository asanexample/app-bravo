name: Deploy

# Thin caller (v3 / ADR-067). The supply-chain backbone lives in the app-team-unwritable asanexample/trusted-ci
# repo:
#   build  -> build-sign.yml     builds from the Dockerfile, pushes to the PRODUCT-scoped repo team-bravo/demo-web,
#                                cosign-signs the image + attaches a CycloneDX SBOM (under trusted-ci's identity).
#   provenance -> slsa-provenance.yml   attaches the SLSA build provenance (SLSA L3, isolated signer).
#   deploy -> pins the signed digest into the dev overlay (k8s/overlays/dev) and commits — the GitOps source the
#             per-Product ApplicationSet syncs. Promotion to test/uat/staging/prod is by PR (promote-by-PR, #377).
# Pins are by SHA so the OIDC cert identities are the per-product ones Kyverno verify-images-product /
# verify-attestations-product expect.

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    # Don't re-trigger on the deploy job's own manifest commit.
    if: "!startsWith(github.event.head_commit.message, 'deploy:')"
    permissions:
      id-token: write # OIDC: AWS (ECR push) + cosign keyless signing
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@1b181609f5aed2da37573f338d438addc9f253d7
    with:
      app: demo-web # product-scoped image: team-bravo/demo-web (Product "demo", Service "web")
      product: demo # selects the per-Product OIDC role github-actions-ecr-push-product-bravo-demo (ADR-069)
      tag: ${{ github.sha }}

  provenance:
    needs: build
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@1b181609f5aed2da37573f338d438addc9f253d7
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      product: demo # selects the per-Product OIDC role github-actions-ecr-push-product-bravo-demo (ADR-069)

  # Gated on BOTH build and provenance so the digest the ApplicationSet picks up already carries its signature,
  # SBOM AND provenance — no window where Kyverno's Enforce verify-*-product would reject it.
  deploy:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Pin the dev overlay to the signed digest
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Replace the kustomize images entry's newTag with the immutable digest (kustomize pins by digest).
          IMAGE="$IMAGE" DIGEST="$DIGEST" yq -i '
            (.images[] | select(.name == strenv(IMAGE)))
              |= (.digest = strenv(DIGEST) | del(.newTag))
          ' k8s/overlays/dev/kustomization.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet || git commit -m "deploy: pin dev to ${{ github.sha }}"
          git push
