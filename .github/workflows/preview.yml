name: PR Preview

# Thin caller (same shared build-sign + slsa-provenance siblings as deploy.yml, but no deploy/commit job).
# Builds + signs + provenances a PR image so previews satisfy the same Kyverno verify-images /
# verify-attestations checks. bravo's Tenant claim has preview: false today, so there is no preview
# ApplicationSet deploying these images yet — they are built for parity and activate when the claim flips
# preview: true. Fork PRs get no OIDC token, so they fail closed (cannot push) — by design.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@70fc4ba48c7aa66e988ca2d30c2327a2d98f49e7
    with:
      app: demo
      tag: ${{ github.event.pull_request.head.sha }}

  provenance:
    needs: build
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@5e8a6b33515767cb80429d9e1831ab5143b5c477
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
